<!DOCTYPE html>
<html>
<head>

<title>CloudSage Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<style>

body{
margin:0;
font-family:Segoe UI, Arial;
background:#0b0f19;
color:white;
display:flex;
}

/* SIDEBAR */

.sidebar{
width:230px;
background:#0f172a;
height:100vh;
padding:25px;
}

.sidebar h2{
margin-bottom:40px;
color:#38bdf8;
}

.sidebar a{
display:block;
padding:10px;
margin:10px 0;
color:white;
text-decoration:none;
border-radius:6px;
}

.sidebar a:hover{
background:#1e293b;
}

/* MAIN AREA */

.main{
flex:1;
padding:40px;
}

/* CARDS */

.cards{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
margin-bottom:40px;
}

.card{
background:#111827;
padding:25px;
border-radius:10px;
text-align:center;
}

/* PANELS */

.panel{
background:#111827;
padding:20px;
border-radius:10px;
margin-top:10px;
}

.serverCard{
background:#1e293b;
padding:10px;
margin-bottom:10px;
border-radius:6px;
}

</style>

</head>

<body>

<div class="sidebar">

<h2>CloudSage</h2>

<a href="#">Dashboard</a>
<a href="#">Logs</a>
<a href="#">Alerts</a>
<a href="#" onclick="logout()">Logout</a>

</div>

<div class="main">

<h1>CloudSage Dashboard</h1>

<div class="cards">

<div class="card">
<h3>Status</h3>
<p id="serverStatus"></p>
</div>

<div class="card">
<h3>Platform</h3>
<p id="platform"></p>
</div>

<div class="card">
<h3>CPU Cores</h3>
<p id="cpu"></p>
</div>

<div class="card">
<h3>Uptime</h3>
<p id="uptime"></p>
</div>

</div>

<h3>Memory Usage</h3>
<canvas id="memoryChart"></canvas>

<h3 style="margin-top:40px;">CPU Load</h3>
<canvas id="cpuChart"></canvas>

<h3 style="margin-top:40px;">Recent Logs</h3>
<div class="panel" id="logsBox"></div>

<h3 style="margin-top:40px;">Servers</h3>
<div class="panel" id="serversBox"></div>

<h3 style="margin-top:40px;">Alerts</h3>
<div class="panel" id="alertsBox"></div>

<h3 style="margin-top:40px;">Containers</h3>
<div class="panel" id="containersBox"></div>

<h3 style="margin-top:40px;">AI System Analysis</h3>
<div class="panel" id="analysisBox"></div>

</div>

<script>

/* TOKEN CHECK */

const token = localStorage.getItem("token");

if(!token){
window.location.href="login.html";
}

/* CHART VARIABLES */

let memoryChart;
let cpuChart;

let cpuHistory=[];
let labels=[];

/* SOCKET.IO */

const socket = io("http://localhost:5000");

socket.on("systemMetrics",(data)=>{

const usedMem=parseFloat(data.usedMemory);
const freeMem=parseFloat(data.freeMemory);
const cpuLoad=parseFloat(data.cpuLoad);

/* MEMORY CHART */

if(!memoryChart){

memoryChart=new Chart(document.getElementById("memoryChart"),{
type:"doughnut",
data:{
labels:["Used","Free"],
datasets:[{
data:[usedMem,freeMem],
backgroundColor:["#ef4444","#22c55e"]
}]
}
});

}else{

memoryChart.data.datasets[0].data=[usedMem,freeMem];
memoryChart.update();

}

/* CPU GRAPH */

const time=new Date().toLocaleTimeString();

cpuHistory.push(cpuLoad);
labels.push(time);

if(cpuHistory.length>12){
cpuHistory.shift();
labels.shift();
}

if(!cpuChart){

cpuChart=new Chart(document.getElementById("cpuChart"),{
type:"line",
data:{
labels:labels,
datasets:[{
label:"CPU Load",
data:cpuHistory,
borderColor:"#38bdf8",
fill:false
}]
}
});

}else{

cpuChart.data.labels=labels;
cpuChart.data.datasets[0].data=cpuHistory;
cpuChart.update();

}

});

/* STATUS */

async function loadStatus(){

const res=await fetch("http://localhost:5000/api/status");
const data=await res.json();

document.getElementById("serverStatus").innerText=data.server;
document.getElementById("platform").innerText=data.platform;
document.getElementById("cpu").innerText=data.cpuCores;
document.getElementById("uptime").innerText=Math.floor(data.uptime)+" sec";

}

/* LOGS */

async function loadLogs(){

const res=await fetch("http://localhost:5000/api/logs");
const logs=await res.json();

const box=document.getElementById("logsBox");
box.innerHTML="";

logs.forEach(log=>{
const p=document.createElement("p");
p.innerText=log;
box.appendChild(p);
});

}

/* SERVERS */

async function loadServers(){

const res=await fetch("http://localhost:5000/api/servers");
const servers=await res.json();

const box=document.getElementById("serversBox");
box.innerHTML="";

servers.forEach(server=>{

const div=document.createElement("div");
div.className="serverCard";

div.innerHTML=`
<b>${server.name}</b><br>
CPU: ${server.cpu}%<br>
Memory: ${server.memory}%<br>
Status: ${server.status}
`;

box.appendChild(div);

});

}

/* ALERTS */

async function loadAlerts(){

const res=await fetch("http://localhost:5000/api/alerts");
const alerts=await res.json();

const box=document.getElementById("alertsBox");
box.innerHTML="";

alerts.forEach(alert=>{

const div=document.createElement("div");
div.className="serverCard";

div.innerHTML=`⚠ ${alert.message}`;

box.appendChild(div);

});

}

/* CONTAINERS */

async function loadContainers(){

const res=await fetch("http://localhost:5000/api/containers");
const containers=await res.json();

const box=document.getElementById("containersBox");
box.innerHTML="";

containers.forEach(container=>{

const div=document.createElement("div");
div.className="serverCard";

div.innerHTML=`
<b>${container.name}</b><br>
Image: ${container.image}<br>
Status: ${container.status}
`;

box.appendChild(div);

});

}

/* AI ANALYSIS */

async function loadAnalysis(){

const res=await fetch("http://localhost:5000/api/analysis");
const data=await res.json();

const box=document.getElementById("analysisBox");
box.innerHTML="";

data.analysis.forEach(issue=>{

const div=document.createElement("div");
div.className="serverCard";

div.innerText=issue;

box.appendChild(div);

});

}

/* INITIAL LOAD */

loadStatus();
loadLogs();
loadServers();
loadAlerts();
loadContainers();
loadAnalysis();

/* AUTO REFRESH */

setInterval(loadLogs,10000);
setInterval(loadServers,10000);
setInterval(loadAlerts,10000);
setInterval(loadContainers,10000);
setInterval(loadAnalysis,10000);

/* LOGOUT */

function logout(){

localStorage.removeItem("token");
window.location.href="login.html";

}

</script>

</body>
</html>
