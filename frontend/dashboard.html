<!DOCTYPE html>
<html>
<head>

<title>CloudSage Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
font-family:Segoe UI, Arial;
background:#0b0f19;
color:white;
display:flex;
}

/* SIDEBAR */

.sidebar{
width:230px;
background:#0f172a;
height:100vh;
padding:25px;
box-shadow:2px 0 10px rgba(0,0,0,0.5);
}

.sidebar h2{
margin-bottom:40px;
color:#38bdf8;
}

.sidebar a{
display:block;
padding:10px;
margin:10px 0;
color:white;
text-decoration:none;
border-radius:6px;
transition:0.2s;
}

.sidebar a:hover{
background:#1e293b;
padding-left:15px;
}

/* MAIN AREA */

.main{
flex:1;
padding:40px;
}

/* CARDS */

.cards{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
margin-bottom:40px;
}

.card{
background:#111827;
padding:25px;
border-radius:10px;
text-align:center;
box-shadow:0 0 10px rgba(0,0,0,0.4);
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
box-shadow:0 0 15px rgba(56,189,248,0.5);
}

/* SERVER CARDS */

.serverCard{
background:#111827;
padding:20px;
margin-bottom:10px;
border-radius:10px;
}

/* LOG BOX */

#logsBox{
background:#111827;
padding:20px;
border-radius:10px;
max-height:200px;
overflow-y:auto;
}

/* ALERTS */

.alertCard{
background:#1e293b;
padding:10px;
margin-bottom:10px;
border-radius:6px;
}

/* ALERT BANNER */

#alertBox{
display:none;
background:#dc2626;
padding:10px;
border-radius:6px;
margin-bottom:20px;
}

</style>

</head>

<body>

<div class="sidebar">

<h2>CloudSage</h2>

<a href="#">Dashboard</a>
<a href="#">Logs</a>
<a href="#">Alerts</a>
<a href="#" onclick="logout()">Logout</a>

</div>

<div class="main">

<h1>CloudSage Dashboard</h1>

<div id="alertBox">⚠ High memory usage detected</div>

<div class="cards">

<div class="card">
<h3>Status</h3>
<p id="serverStatus"></p>
</div>

<div class="card">
<h3>Platform</h3>
<p id="platform"></p>
</div>

<div class="card">
<h3>CPU Cores</h3>
<p id="cpu"></p>
</div>

<div class="card">
<h3>Uptime</h3>
<p id="uptime"></p>
</div>

</div>

<h3>Memory Usage</h3>
<canvas id="memoryChart"></canvas>

<h3 style="margin-top:40px;">CPU Load</h3>
<canvas id="cpuChart"></canvas>

<h3 style="margin-top:40px;">Recent Logs</h3>
<div id="logsBox"></div>

<h3 style="margin-top:40px;">Servers</h3>
<div id="serversBox"></div>

<h3 style="margin-top:40px;">Alerts</h3>
<div id="alertsBox"></div>

</div>

<script>

const token = localStorage.getItem("token");

if(!token){
window.location.href="login.html";
}

let memoryChart;
let cpuChart;

let cpuHistory=[];
let labels=[];

/* LOAD STATUS */

async function loadStatus(){

const response=await fetch("http://localhost:5000/api/status");
const data=await response.json();

document.getElementById("serverStatus").innerText=data.server;
document.getElementById("platform").innerText=data.platform;
document.getElementById("cpu").innerText=data.cpuCores;
document.getElementById("uptime").innerText=Math.floor(data.uptime)+" sec";

const usedMem=parseFloat(data.usedMemory);
const freeMem=parseFloat(data.freeMemory);
const cpuLoad=parseFloat(data.cpuLoad);

const usedPercent=(usedMem/(usedMem+freeMem))*100;

if(usedPercent>80){
document.getElementById("alertBox").style.display="block";
}else{
document.getElementById("alertBox").style.display="none";
}

/* MEMORY CHART */

if(!memoryChart){

memoryChart=new Chart(document.getElementById("memoryChart"),{
type:"doughnut",
data:{
labels:["Used","Free"],
datasets:[{
data:[usedMem,freeMem],
backgroundColor:["#ef4444","#22c55e"]
}]
}
});

}else{

memoryChart.data.datasets[0].data=[usedMem,freeMem];
memoryChart.update();

}

/* CPU HISTORY */

const time=new Date().toLocaleTimeString();

cpuHistory.push(cpuLoad);
labels.push(time);

if(cpuHistory.length>12){
cpuHistory.shift();
labels.shift();
}

if(!cpuChart){

cpuChart=new Chart(document.getElementById("cpuChart"),{
type:"line",
data:{
labels:labels,
datasets:[{
label:"CPU Load",
data:cpuHistory,
borderColor:"#38bdf8",
fill:false
}]
}
});

}else{

cpuChart.data.labels=labels;
cpuChart.data.datasets[0].data=cpuHistory;
cpuChart.update();

}

}

/* LOAD LOGS */

async function loadLogs(){

const response=await fetch("http://localhost:5000/api/logs");
const logs=await response.json();

const box=document.getElementById("logsBox");
box.innerHTML="";

logs.forEach(log=>{
const p=document.createElement("p");
p.innerText=log;
box.appendChild(p);
});

}

/* LOAD SERVERS */

async function loadServers(){

const response=await fetch("http://localhost:5000/api/servers");
const servers=await response.json();

const box=document.getElementById("serversBox");
box.innerHTML="";

servers.forEach(server=>{

const div=document.createElement("div");

div.className="serverCard";

div.innerHTML=`
<b>${server.name}</b><br>
CPU: ${server.cpu}%<br>
Memory: ${server.memory}%<br>
Status: ${server.status}
`;

box.appendChild(div);

});

}

/* LOAD ALERTS */

async function loadAlerts(){

const response=await fetch("http://localhost:5000/api/alerts");
const alerts=await response.json();

const box=document.getElementById("alertsBox");
box.innerHTML="";

alerts.forEach(alert=>{

const div=document.createElement("div");

div.className="alertCard";

div.innerHTML=`⚠ ${alert.message}`;

box.appendChild(div);

});

}

/* LOGOUT */

function logout(){

localStorage.removeItem("token");
window.location.href="login.html";

}

loadStatus();
loadLogs();
loadServers();
loadAlerts();

setInterval(loadStatus,5000);
setInterval(loadLogs,10000);
setInterval(loadServers,10000);
setInterval(loadAlerts,10000);

</script>

</body>
</html>
